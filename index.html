<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mente y Cuerpo Sano — Sistema de Gestión</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --red: #e8192c;
      --red-dark: #b5131f;
      --red-glow: rgba(232,25,44,0.15);
      --text: #f0f0f0;
      --muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* HEADER ORIGINAL */
    header {
      background: var(--dark);
      border-bottom: 2px solid var(--red);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(232,25,44,0.2);
    }
    .brand { display: flex; align-items: center; gap: 0.8rem; }
    #gym-logo { height: 50px; width: auto; display: block; object-fit: contain; }
    .logo-block { display: flex; flex-direction: column; line-height: 1; }
    .logo {
      font-family: 'Black Ops One', cursive;
      font-size: 1.5rem;
      color: var(--red);
      letter-spacing: 1px;
      text-shadow: 0 0 20px var(--red);
    }
    .logo-sub { font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    
    .nav-container { display: flex; gap: 0.8rem; }
    .btn-nav {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1.2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .btn-nav.active { background: var(--red); border-color: var(--red); color: #fff; }
    .btn-nav:hover:not(.active) { border-color: var(--red); }

    main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
    
    /* TITULOS CON SIGNOS */
    .section-title {
      font-family: 'Black Ops One', cursive;
      font-size: 1.6rem;
      color: var(--red);
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--red), transparent); }

    /* CONTENEDORES Y INPUTS */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
    .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; }

    .form-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
    @media (max-width: 900px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }
    input {
      background: #191919;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.8rem;
      border-radius: 4px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { outline: none; border-color: var(--red); }

    .btn-submit {
      background: var(--red);
      color: #fff;
      padding: 0.75rem 1.8rem;
      border: none;
      border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: all 0.2s;
    }
    .btn-submit:hover { background: var(--red-dark); box-shadow: 0 0 15px var(--red-glow); }

    /* BUSCADOR */
    .search-container { position: relative; margin-bottom: 1.5rem; }
    .search-container input { background: var(--card); padding: 0.8rem 1rem; font-size: 0.95rem; border: 1px solid var(--border); }

    /* TABLA */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0.8rem 1rem; text-align: left; border-bottom: 2px solid var(--red); }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); color: var(--text); }
    .empty-row { text-align: center; padding: 2.5rem; color: var(--muted); }

    /* ACCIONES INFERIORES */
    .bottom-actions { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .btn-action {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 0.6rem 1.2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .btn-action:hover { background: rgba(232,25,44,0.1); }

    /* SPLASH ORIGINAL */
    .splash {
      position: fixed; inset: 0; background: var(--black);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.4s ease, visibility 0.4s;
    }
    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-logo { width: 280px; height: auto; }
  </style>
</head>
<body>

  <div id="splash" class="splash">
    <img src="logo.png" class="splash-logo" alt="Cargando Mente y Cuerpo Sano">
  </div>

  <header>
    <div class="brand">
      <img id="gym-logo" src="logo.png" alt="Logo">
      <div class="logo-block">
        <span class="logo">Mente y Cuerpo Sano</span>
        <span class="logo-sub">Sistema de Gestión • Gym</span>
      </div>
    </div>
    <div class="nav-container">
      <button class="btn-nav active">👥 Miembros</button>
      <button class="btn-nav">💰 Contabilidad</button>
    </div>
  </header>

  <main>
    
    <h1 class="section-title">➕ Agregar Miembro</h1>
    
    <div class="card">
      <div class="card-title">Datos Personales</div>
      <form class="form-grid" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Ej: Carlos">
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" placeholder="Ej: Gómez">
        </div>
        <div class="form-group">
          <label>Fecha de Nacimiento</label>
          <input type="date">
        </div>
        <div class="form-group">
          <label>Edad (Años)</label>
          <input type="number" placeholder="25">
        </div>
        <div class="form-group">
          <label>Estatura (CM)</label>
          <input type="number" placeholder="175">
        </div>
        <div class="form-group">
          <label>Peso (KG)</label>
          <input type="number" placeholder="70">
        </div>
        <div class="form-group">
          <label>Cintura (CM)</label>
          <input type="number" placeholder="85">
        </div>
      </form>
      
      <button type="submit" class="btn-submit">Registrar Miembro</button>
    </div>

    <h1 class="section-title">📋 Miembros Registrados</h1>
    
    <div class="search-container">
      <input type="text" style="width:100%;" placeholder="🔍 Buscar cliente por nombre, cédula o teléfono...">
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
            <th>Peso</th>
            <th>Estatura</th>
            <th>Cintura</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          </tbody>
      </table>
      <div class="empty-row">
        🏋️‍♂️ No hay miembros registrados aún.
      </div>
    </div>

    <div class="bottom-actions">
      <button class="btn-action">📅 Ver Calendario de Asistencia</button>
      <button class="btn-action">📈 Ver Objetivos Físicos</button>
    </div>

  </main>

  <script>
    // Control del Splash Screen original
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if(splash) splash.classList.add('hidden');
      }, 1000);
    });
  </script>

</body>
</html>
