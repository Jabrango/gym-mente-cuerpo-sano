<html lang="es">

<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #181818;

    --red: #e8192c;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    background: var(--dark);
    border-bottom: 2px solid var(--red);

    align-items: center;

    position: sticky;

    box-shadow: 0 4px 30px rgba(232,25,44,0.2);
    gap: 1rem;
    flex-wrap: wrap;
  }
  .logo-block { display: flex; flex-direction: column; line-height: 1; }
  .brand { display: flex; align-items: center; gap: 0.6rem; }
  #gym-logo { width: 140px; height: auto; max-height:80px; display: block; }
  .logo {
    font-family: 'Black Ops One', cursive;
    font-size: 1.5rem;
    color: var(--red);
    letter-spacing: 2px;
    text-shadow: 0 0 20px var(--red);
  }
  .logo-sub { font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  nav { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.45rem 1rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .tab-btn:hover { border-color: var(--red); color: var(--text); }
  .tab-btn.active { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 0 15px var(--red-glow); }

  main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  .section-title {
    font-family: 'Black Ops One', cursive;
    font-size: 1.5rem;
    color: var(--red);
    margin-bottom: 1.5rem;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--red), transparent); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group.full { grid-column: 1 / -1; }

  label { font-size: 0.76rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  input, select {
    background: #1f1f1f;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.8rem;
    border-radius: 4px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.2s;

  }
  input:focus, select:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 2px var(--red-glow); }

  .payment-options { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 0.4rem; }
  .pay-btn {
    flex: 1; min-width: 100px;
    padding: 0.7rem 1rem;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  }
  .pay-btn:hover { border-color: var(--muted); color: var(--text); }
  .pay-btn.selected-fisico { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  .pay-btn.selected-nequi { border-color: var(--blue); color: var(--blue); background: rgba(59,130,246,0.08); }
  .pay-btn.selected-fiado { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.08); }

  .btn {
    padding: 0.75rem 2rem;
    border-radius: 4px; border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--red); color: #fff; }
  .btn-primary:hover { background: var(--red-dark); box-shadow: 0 0 20px var(--red-glow); transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-outline:hover { background: var(--red-glow); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
  .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.78rem; }
  .btn-xs { padding: 0.2rem 0.5rem; font-size: 0.72rem; }

  .search-bar { position: relative; margin-bottom: 1.5rem; }
  .search-bar input { padding-left: 2.8rem; font-size: 1rem; height: 48px; }
  .search-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.1rem; }

  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
  thead tr { border-bottom: 2px solid var(--red); }
  th { font-family: 'Barlow Condensed', sans-serif; font-size: 0.76rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 0.7rem 1rem; text-align: left; white-space: nowrap; }
  td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 3px; font-size: 0.73rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
  .badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); border: 1px solid rgba(249,115,22,0.3); }
  .badge-red { background: rgba(232,25,44,0.15); color: var(--red); border: 1px solid rgba(232,25,44,0.3); }
  .badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); border: 1px solid rgba(168,85,247,0.3); }

  .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.95rem; }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; text-align: center; }
  .stat-num { font-family: 'Black Ops One', cursive; font-size: 1.8rem; color: var(--red); }
  .stat-label { font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }
  .stat-card.green .stat-num { color: var(--green); }
  .stat-card.blue .stat-num { color: var(--blue); }
  .stat-card.orange .stat-num { color: var(--orange); }

  .date-bar { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .date-bar .form-group { margin: 0; }
  .register-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .register-row select { max-width: 220px; }

  /* ══ MODAL BASE ══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    border-radius: 8px;
    padding: 2rem;
    width: 100%;
    max-width: 520px;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }
  .modal-close:hover { color: var(--red); }
  .modal-title { font-family: 'Black Ops One', cursive; font-size: 1.2rem; color: var(--red); margin-bottom: 1.2rem; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  .detail-item label { font-size: 0.72rem; color: var(--muted); display: block; margin-bottom: 0.2rem; }
  .detail-item span { font-size: 1rem; font-weight: 600; }

  /* ══ CALENDAR ══ */
  .cal-modal { max-width: 700px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .cal-month { font-family: 'Black Ops One', cursive; font-size: 1.1rem; color: var(--text); }
  .cal-nav { background: none; border: 1px solid var(--border); color: var(--text); padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
  .cal-nav:hover { border-color: var(--red); color: var(--red); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name { text-align: center; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 0.3rem 0; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    position: relative;
    flex-direction: column;
    gap: 2px;
    min-height: 42px;
  }
  .cal-day:hover { border-color: var(--border); }
  .cal-day.empty { cursor: default; }
  .cal-day.today { border-color: var(--muted) !important; }
  .cal-day.entreno { background: rgba(34,197,94,0.2); border-color: var(--green) !important; color: var(--green); }
  .cal-day.descanso { background: rgba(59,130,246,0.15); border-color: var(--blue) !important; color: var(--blue); }
  .cal-day.falta { background: rgba(232,25,44,0.15); border-color: var(--red) !important; color: var(--red); }
  .cal-day .day-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-day.entreno .day-dot { background: var(--green); }
  .cal-day.descanso .day-dot { background: var(--blue); }
  .cal-day.falta .day-dot { background: var(--red); }

  .cal-legend { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
  .cal-legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .cal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
  .cal-actions p { font-size: 0.82rem; color: var(--muted); align-self: center; }

  .cal-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.6rem; margin-bottom: 1rem; }
  .cal-stat { background: #1f1f1f; border-radius: 6px; padding: 0.6rem; text-align: center; }
  .cal-stat-num { font-family: 'Black Ops One', cursive; font-size: 1.3rem; }
  .cal-stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  /* ══ METAS ══ */
  .meta-modal { max-width: 600px; }
  .meta-section { margin-bottom: 1.5rem; }
  .meta-section-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .meta-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }
  .meta-item { background: #1f1f1f; border-radius: 6px; padding: 0.8rem; }
  .meta-item label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 0.4rem; }
  .meta-item .val { font-size: 1.1rem; font-weight: 700; }
  .meta-item .val.better { color: var(--green); }
  .meta-item .val.worse { color: var(--red); }
  .meta-item .val.same { color: var(--muted); }
  .meta-progress { margin-top: 0.3rem; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .meta-progress-bar { height: 100%; border-radius: 2px; transition: width 0.5s; }

  .meta-alert { background: rgba(232,25,44,0.1); border: 1px solid rgba(232,25,44,0.3); border-radius: 6px; padding: 0.8rem 1rem; font-size: 0.85rem; color: var(--red); margin-bottom: 1rem; }
  .meta-alert.ok { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--green); }

  .input-meta-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }

  #toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--green); color: #fff;
    padding: 0.8rem 1.5rem; border-radius: 6px;
    font-weight: 600; font-size: 0.95rem;
    transform: translateY(100px); opacity: 0;
    transition: all 0.3s; z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { background: var(--red); }

  @media (max-width: 600px) {
    header { height: auto; padding: 0.8rem 1rem; }
    .logo { font-size: 1.2rem; }
    main { padding: 1rem; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .meta-row, .input-meta-row { grid-template-columns: 1fr 1fr; }
    .cal-modal { max-width: 100%; }
  }

  /* ANIMACIONES SUAVES */
  .fade-in { animation: fadeIn 600ms ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  header { will-change: transform, box-shadow; transition: box-shadow 300ms ease, transform 200ms ease; }
  .brand { align-items: center; }
  .brand .logo { transform-origin: left center; transition: transform 300ms cubic-bezier(.2,.9,.2,1); }
  #gym-logo { transition: transform 300ms ease, filter 300ms ease; will-change: transform, filter; border-radius: 6px; }
  #gym-logo:hover { transform: translateY(-4px) scale(1.03); filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6)); }

  nav .tab-btn { transform-origin: center; }
  nav .tab-btn { transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease; }
  nav .tab-btn:active { transform: translateY(1px) scale(0.995); }

  .card { transition: transform 240ms ease, box-shadow 240ms ease; }
  .card:hover { transform: translateY(-6px); box-shadow: 0 18px 40px rgba(0,0,0,0.45); }

  .section-title { opacity: 0.98; }

  /* Toast micro animation */
  #toast { transition: transform 300ms cubic-bezier(.2,.9,.2,1), opacity 300ms ease; }

  /* Aplica entrada suave a elementos principales */
  header, main, .card, .section-title, table, .stat-card { will-change: opacity, transform; }
  header.fade-in, main.fade-in, .card.fade-in, .section-title.fade-in { animation: fadeIn 500ms var(--delay, 0ms) both; }

  /* SPLASH LOGO (entrada) */
  .splash {
    position: fixed; inset: 0; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at center, rgba(232,25,44,0.04) 0%, rgba(17,17,17,0.98) 60%), linear-gradient(180deg, rgba(10,10,10,1) 0%, rgba(17,17,17,0.98) 100%);
    z-index: 9999; overflow: hidden; opacity: 1; visibility: visible; pointer-events: auto;
    -webkit-font-smoothing:antialiased;
  }
  .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  /* logo más grande y definición de animaciones */
  .splash-logo { width: 320px; max-width: 72%; height: auto; transform-origin:center center; will-change: transform, opacity, filter; }

  @keyframes splashIn {
    0% { opacity: 0; transform: scale(0.88) rotate(-3deg); filter: blur(8px) saturate(0.6); }
    60% { opacity: 1; transform: scale(1.06) rotate(1.2deg); filter: blur(0) saturate(1.02); }
    100% { opacity: 1; transform: scale(1) rotate(0); filter: blur(0) saturate(1); }
  }
  @keyframes splashOut {
    0% { opacity: 1; transform: scale(1) rotate(0); filter: blur(0); }
    100% { opacity: 0; transform: scale(1.36) rotate(4deg); filter: blur(3px) saturate(0.9); }
  }

  .splash.splash-enter .splash-logo { animation: splashIn 700ms cubic-bezier(.2,.9,.25,1) both; }
  .splash.splash-leave { pointer-events: none; }
  .splash.splash-leave .splash-logo { animation: splashOut 760ms cubic-bezier(.2,.9,.25,1) both; }

  /* ligero pulso de sombra durante la entrada */
  .splash.splash-enter .splash-logo { box-shadow: 0 14px 40px rgba(0,0,0,0.55); }
  @media (max-width:600px){ .splash-logo{ width:220px } }
  /* Entradas desde los lados / arriba / abajo */
  @keyframes enterLeft { from { opacity:0; transform: translateX(-34px) scale(.997); } to { opacity:1; transform: translateX(0); } }
  @keyframes enterRight { from { opacity:0; transform: translateX(34px) scale(.997); } to { opacity:1; transform: translateX(0); } }
  @keyframes enterTop { from { opacity:0; transform: translateY(-22px); } to { opacity:1; transform: translateY(0); } }
  @keyframes enterBottom { from { opacity:0; transform: translateY(22px); } to { opacity:1; transform: translateY(0); } }

  .enter-left { animation: enterLeft 700ms cubic-bezier(.2,.9,.25,1) both; }
  .enter-right { animation: enterRight 700ms cubic-bezier(.2,.9,.25,1) both; }
  .enter-top { animation: enterTop 640ms cubic-bezier(.2,.9,.25,1) both; }
  .enter-bottom { animation: enterBottom 640ms cubic-bezier(.2,.9,.25,1) both; }

  /* ocultar elementos antes de la animación para evitar parpadeo */
  header, nav, .brand .logo, main, .section-title, .card { opacity: 0; }

  /* FORMULARIOS, BOTONES Y FILAS */
  /* No ocultamos directamente inputs/selects para evitar que parezcan vacíos; animamos los contenedores */
  .form-group, .payment-options .pay-btn, .btn-primary { opacity: 0; transform: translateY(8px); }
  .enter-fade { animation: fadeIn 480ms cubic-bezier(.2,.9,.25,1) both; }
  .enter-up { animation: enterTop 520ms cubic-bezier(.2,.9,.25,1) both; }
  .pay-btn { transition: transform 220ms cubic-bezier(.2,.9,.25,1), box-shadow 220ms ease; }
  .pay-btn:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 10px 26px rgba(0,0,0,0.45); }
  .btn-primary { transition: transform 220ms cubic-bezier(.2,.9,.25,1), box-shadow 220ms ease; }
  .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(232,25,44,0.18); }
  table tbody tr { transform-origin: left center; }
</style>
</head>
<body>
